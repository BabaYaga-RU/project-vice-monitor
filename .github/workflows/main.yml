name: Uptime Bot
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  uptime:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Config Git
        run: |
          git config --global user.name "PkLavc"
          git config --global user.email "patrickajm@gmail.com"

      - name: Random Start Delay
        run: |
          # Delay para evitar padrões de bot muito óbvios
          DELAY=$(( ( RANDOM % 903 ) + 2700 ))
          sleep $DELAY

      - name: Run Check
        run: |
          # Limpa qualquer resíduo e roda o monitor
          git reset --hard HEAD
          python monitor.py
        
      - name: Random Commit Delay
        run: |
          DELAY=$(( ( RANDOM % 120 ) + 300 ))
          sleep $DELAY

      - name: Auto PR and Merge
        env:
          GH_TOKEN: ${{ secrets.PAT_SHARK }}
        run: |
          # 1. Adiciona e commita localmente PRIMEIRO
          # Isso evita o erro de "dirty index" durante o rebase
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "fix: update uptime status and monitor data"
          else
            echo "Nenhuma mudança detectada nos logs."
          fi

          # 2. Sincroniza com o repositório remoto
          # -X ours: Em caso de conflito nos JSONs, mantém a sua versão local (a mais nova)
          git pull --rebase origin main -X ours

          # 3. Executa o script de workflow
          # Certifique-se de que o workflow.sh use 'gh pr create' para a badge Pull Shark
          chmod +x workflow.sh
          bash workflow.sh
