name: Uptime Bot
on:
  schedule:
    - cron: "0 * * * *" # Roda de 1 em 1 hora
  workflow_dispatch:

jobs:
  uptime:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Check
        run: python monitor.py
      - name: Auto PR and Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "PkLavc"
          git config user.email "patrickajm@gmail.com"
          
          BRANCH="status-update-${{ github.run_id }}"
          git checkout -b $BRANCH
          git add uptime_log.txt
          git commit -m "chore: update uptime status"
          git push origin $BRANCH
          
          PR_URL=$(gh pr create --title "Uptime Check: $(date +'%Y-%m-%d')" --body "Automated check" --base main --head $BRANCH)
          gh pr merge $PR_URL --merge --admin
